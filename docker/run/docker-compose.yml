services:
  agent-zero:
    container_name: agent-zero
    image: ${AGENT_ZERO_IMAGE:-agent-zero-hardened:latest}
    volumes:
      # Mount /a0/usr to persist user data (memories, skills, settings) across restarts.
      # Remove this if you want a fully ephemeral container.
      - agent-zero-usr:/a0/usr
    ports:
      - "127.0.0.1:50080:80"

volumes:
  agent-zero-usr:
