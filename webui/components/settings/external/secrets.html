<html>
  <head>
    <title>Secrets</title>
  </head>

  <body>
    <div x-data="{
      get settings() { return $store.settings.settings },
      get opTestStatus()  { return $store.settings._opTestStatus },
      get opTestMessage() { return $store.settings._opTestMessage },
      testOp() { $store.settings.testOpConnection() }
    }">
      <template x-if="settings">
        <div>
          <div class="section-title">Secrets Management</div>
          <div class="section-description">
            Manage secrets and credentials that agents can use without exposing values to LLMs, chat history or logs. Placeholders are automatically replaced with values just before tool calls. If bare passwords occur in tool results, they are masked back to placeholders.
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">1Password Service Account Token</div>
              <div class="field-description">
                Optional. Paste a service account token (<code>ops_…</code>) to resolve
                <code>op://vault/item/field</code> references in the Secrets Store below.
                The token is stored in <code>.env</code> and never logged.<br>
                <a href="https://developer.1password.com/docs/service-accounts/" target="_blank">Create a service account</a>
                &nbsp;·&nbsp;
                <a href="https://developer.1password.com/docs/cli/get-started/" target="_blank">Install the op CLI</a>
              </div>
            </div>
            <div class="field-control" style="display:flex; flex-direction:column; gap:0.5em;">
              <input type="password" autocomplete="off" x-model="settings.op_service_account_token" placeholder="ops_eyJ…" />
              <div style="display:flex; align-items:center; gap:0.75em;">
                <button @click="testOp()" :disabled="opTestStatus === 'testing'">
                  <span x-text="opTestStatus === 'testing' ? 'Testing…' : 'Test connection'"></span>
                </button>
                <span
                  x-show="opTestStatus === 'ok'"
                  style="color: var(--color-success, #4caf50); font-size: 0.875em;"
                  x-text="opTestMessage">
                </span>
                <span
                  x-show="opTestStatus === 'error'"
                  style="color: var(--color-danger, #f44336); font-size: 0.875em;"
                  x-text="opTestMessage">
                </span>
              </div>
            </div>
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">Variables Store</div>
              <div class="field-description">
                Store non-sensitive variables in .env format e.g. EMAIL_IMAP_SERVER="imap.gmail.com", one item per line. You can use comments starting with # to add descriptions for the agent. See <a href="javascript:openModal('settings/secrets/example-vars.html')">example</a>.<br>These variables are visible to LLMs and in chat history, they are not being masked.
              </div>
            </div>
            <div class="field-control">
              <textarea style="height: 20em" x-model="settings.variables"></textarea>
            </div>
          </div>

          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">Secrets Store</div>
              <div class="field-description">
                Store secrets and credentials in .env format e.g. EMAIL_PASSWORD="s3cret-p4$$w0rd", one item per line. You can use comments starting with # to add descriptions for the agent. See <a href="javascript:openModal('settings/secrets/example-secrets.html')">example</a>.<br>These variables are not visile to LLMs and in chat history, they are being masked. ⚠️ only values with length >= 4 are being masked to prevent false positives.
              </div>
            </div>
            <div class="field-control">
              <textarea style="height: 20em" x-model="settings.secrets"></textarea>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
