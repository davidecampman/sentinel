<html>
  <head>
    <title>Agent Config</title>
  </head>

  <body>
    <div x-data>
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">Agent Config</div>
          <div class="section-description">
            Agent parameters.
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Profile users talk to</div>
              <div class="field-description">
                The agent profile that users communicate with directly. Subordinate agents can be spawned with other profiles by the superior agent.
              </div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.agent_profile">
                <template x-for="option in $store.settings.additional?.agent_subdirs" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.agent_profile" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Knowledge subdirectory</div>
              <div class="field-description">
                Subdirectory of /knowledge folder to use for agent knowledge import. 'default' subfolder is always imported and contains framework knowledge.
              </div>
            </div>
            <div class="field-control">
              <select x-model="$store.settings.settings.agent_knowledge_subdir">
                <template x-for="option in $store.settings.additional?.knowledge_subdirs" :key="option.value">
                  <option :value="option.value" :selected="option.value === $store.settings.settings.agent_knowledge_subdir" x-text="option.label"></option>
                </template>
              </select>
            </div>
          </div>

          <div
            x-data="{
              selectedProfile: $store.settings.settings?.agent_profile || '',
              get overrides() {
                const pmo = $store.settings.additional?.profile_model_overrides;
                const p = this.selectedProfile;
                if (!pmo || !p) return {};
                if (!pmo[p]) pmo[p] = {};
                return pmo[p];
              }
            }"
          >
            <div class="section-title" style="margin-top: 1.5rem;">Chat model override per profile</div>
            <div class="section-description">
              Override the chat model used when a specific agent profile is active. Leave blank to use the global chat model settings.
            </div>

            <div class="field">
              <div class="field-label">
                <div class="field-title">Profile to configure</div>
                <div class="field-description">Select which agent profile's chat model you want to override.</div>
              </div>
              <div class="field-control">
                <select x-model="selectedProfile">
                  <template x-for="option in $store.settings.additional?.agent_subdirs" :key="option.value">
                    <option :value="option.value" x-text="option.label"></option>
                  </template>
                </select>
              </div>
            </div>

            <div class="field">
              <div class="field-label">
                <div class="field-title">Provider override</div>
                <div class="field-description">Override the chat model provider for this profile.</div>
              </div>
              <div class="field-control">
                <select x-model="overrides.chat_model_provider">
                  <option value="">— Use global —</option>
                  <template x-for="option in $store.settings.additional?.chat_providers" :key="option.value">
                    <option :value="option.value" x-text="option.label"></option>
                  </template>
                </select>
              </div>
            </div>

            <div class="field">
              <div class="field-label">
                <div class="field-title">Model name override</div>
                <div class="field-description">Override the chat model name for this profile.</div>
              </div>
              <div class="field-control">
                <input
                  type="text"
                  x-model="overrides.chat_model_name"
                  placeholder="e.g. anthropic/claude-sonnet-4.6"
                />
              </div>
            </div>

            <div class="field">
              <div class="field-label">
                <div class="field-title"></div>
              </div>
              <div class="field-control">
                <button @click="$store.settings.saveProfileModelOverrides(selectedProfile)">
                  Save profile model
                </button>
              </div>
            </div>
          </div>

        </div>
      </template>
    </div>
  </body>
</html>
