name: ci-main
on:
  push:
    branches:
      - "main"
jobs:
  docker:
    if: contains(github.event.head_commit.message, 'Merge pull request') && contains(github.event.head_commit.message, 'develop')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: cloud
          endpoint: "decdevelopment/main"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker/run
          file: ./docker/run/Dockerfile
          build-args: |
            BRANCH=main
          tags: "${{ vars.DOCKER_USER }}/sentinel:latest"
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || 'type=registry' }}
